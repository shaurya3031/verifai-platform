<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verif-AI — Secure Access</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: var(--radius-lg);
            animation: fadeInScale 0.6s var(--transition-smooth);
        }
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
            border-radius: var(--radius-md);
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: var(--transition-base);
            font-weight: 600;
            color: var(--text-secondary);
        }
        .auth-tab.active {
            background: var(--gradient-main);
            color: white;
            box-shadow: var(--shadow-glow);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .form-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            color: white;
            font-family: inherit;
            transition: var(--transition-base);
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }
        .auth-submit {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border: none;
            border-radius: var(--radius-md);
            background: var(--gradient-main);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-glow);
        }
        .auth-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4);
        }
        .google-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: white;
            color: #1f2937;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition-base);
        }
        .google-btn:hover {
            background: #f3f4f6;
            transform: translateY(-1px);
        }
        .back-home {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: var(--transition-base);
        }
        .back-home:hover {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div id="shader-container"></div>
    <div class="bg-overlay"></div>

    <a href="index.html" class="back-home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Verif-AI
    </a>

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <h1 id="authTitle">Welcome Back</h1>
                <p id="authSubtitle" style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 8px;">Sign in to continue verifying the truth.</p>
            </div>

            <div class="auth-tabs">
                <div class="auth-tab active" id="loginTab">Login</div>
                <div class="auth-tab" id="signupTab">Signup</div>
            </div>

            <form id="authForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="auth-submit magnetic" id="submitBtn">Sign In</button>
            </form>

            <div style="text-align: center; margin: 24px 0; color: var(--text-muted); font-size: 0.8rem; position: relative;">
                <span style="background: var(--bg-primary); padding: 0 10px; position: relative; z-index: 1;">OR CONTINUE WITH</span>
                <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border-card);"></div>
            </div>

            <button class="google-btn magnetic" id="googleBtn">
                <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                Google
            </button>
        </div>
    </div>

    <!-- SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="shader.js"></script>
    <script src="auth.js"></script>
</body>
</html>
